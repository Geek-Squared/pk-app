<ion-app [class.logged-in]="authenticationService.isLoggedIn">
  <ion-menu *ngIf="authenticationService.isLoggedIn" side="end" menuId="first" contentId="main">
    <!-- <ion-header>
      <ion-toolbar color="primary">
        <ion-title>Positive Konnections</ion-title>
      </ion-toolbar>
    </ion-header> -->
    <ion-content>
      <ion-list class="side-menu">
        <ion-menu-toggle>
          <ion-item routerLink="/" routerDirection="forward"
            ><ion-icon name="chevron-forward"></ion-icon> Dashboard</ion-item
          >
        </ion-menu-toggle>
        <ion-menu-toggle>
          <ion-item routerLink="/introduction" routerDirection="forward"
            ><ion-icon name="chevron-forward"></ion-icon> Introduction</ion-item
          >
        </ion-menu-toggle>
        <ion-menu-toggle>
          <ion-item routerLink="/about" routerDirection="forward"
            ><ion-icon name="chevron-forward"></ion-icon> About Positive
            Konnections</ion-item
          >
        </ion-menu-toggle>
        <ion-menu-toggle>
          <ion-item routerLink="/my-work-book" routerDirection="forward"
            ><ion-icon name="chevron-forward"></ion-icon> My Workbook</ion-item
          >
        </ion-menu-toggle>
        <ion-menu-toggle>
          <ion-item routerLink="/messages" routerDirection="forward"
            ><ion-icon name="chevron-forward"></ion-icon> Messages</ion-item
          >
        </ion-menu-toggle>
        <ion-menu-toggle>
          <ion-item routerLink="/ai-assistant" routerDirection="forward"
            ><ion-icon name="chevron-forward"></ion-icon> AI Assistant</ion-item
          >
        </ion-menu-toggle>
        <ion-menu-toggle>
          <ion-item routerLink="/feedback" routerDirection="forward"
            ><ion-icon name="chevron-forward"></ion-icon> Feedback</ion-item
          >
        </ion-menu-toggle>
        <ion-menu-toggle>
          <ion-item routerLink="/referrals" routerDirection="forward"
            ><ion-icon name="chevron-forward"></ion-icon> Referrals</ion-item
          >
        </ion-menu-toggle>
        <ion-menu-toggle>
          <ion-item routerLink="/bookings" routerDirection="forward"
            ><ion-icon name="chevron-forward"></ion-icon> Bookings</ion-item
          >
        </ion-menu-toggle>
        <ion-menu-toggle>
          <ion-item routerLink="/surveys" routerDirection="forward"
            ><ion-icon name="chevron-forward"></ion-icon> Surveys</ion-item
          >
        </ion-menu-toggle>
        <ion-menu-toggle class="logout">
          <ion-item (click)="logOut()"
            ><ion-icon name="log-out-outline"></ion-icon> Logout</ion-item
          >
        </ion-menu-toggle>
      </ion-list>
    </ion-content>
  </ion-menu>

  <ion-header class="ion-no-border root-shell-header" *ngIf="authenticationService.isLoggedIn && !isDashboardRoute()">
    <div class="dashboard-header-wrapper">
      <header class="top-navbar">
        <div class="breadcrumb" style="display: flex; align-items: center;">
          <ion-icon 
            name="arrow-back-outline" 
            (click)="navigateBack()" 
            style="font-size: 1.25rem; cursor: pointer; color: var(--pk-gray, #64748b); margin-right: 12px; transition: color 0.2s ease;"
            onMouseOver="this.style.color='var(--heading-color)';"
            onMouseOut="this.style.color='var(--pk-gray, #64748b)';"
          ></ion-icon>
          <span class="root" routerLink="/">Dashboard</span>
          <ion-icon name="chevron-forward-outline"></ion-icon>
          <span class="current" style="color: var(--heading-color); font-weight: 700;">{{ currentPageTitle }}</span>
        </div>
        <div class="header-actions">
          <ion-button fill="clear" color="dark">
            <ion-icon name="notifications-outline"></ion-icon>
          </ion-button>
          <div class="user-pill">
            <ion-icon name="person-circle-outline"></ion-icon>
            <ion-icon name="settings-outline"></ion-icon>
          </div>
        </div>
      </header>
    </div>
  </ion-header>

  <div *ngIf="authenticationService.isLoggedIn" class="main-content-layout authenticated">
    <ion-router-outlet id="main" [class.has-header]="!isDashboardRoute()"></ion-router-outlet>
  </div>

  <ion-router-outlet *ngIf="!authenticationService.isLoggedIn" id="main"></ion-router-outlet>

  <!-- Desktop Sidebar - Only appears on desktop -->
  <div *ngIf="authenticationService.isLoggedIn" class="desktop-sidebar">
    <div class="sidebar-header">
      <img src="assets/images/logo.png" alt="Positive Konnections" class="sidebar-logo" />
    </div>
    
    <nav class="sidebar-nav">
      <a routerLink="/" routerDirection="forward" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
        <ion-icon name="grid-outline"></ion-icon>
        <span>Dashboard</span>
      </a>
      <a routerLink="/introduction" routerDirection="forward" routerLinkActive="active" class="nav-item">
        <ion-icon name="play-circle-outline"></ion-icon>
        <span>Introduction</span>
      </a>
      <a routerLink="/about" routerDirection="forward" routerLinkActive="active" class="nav-item">
        <ion-icon name="information-circle-outline"></ion-icon>
        <span>About</span>
      </a>
      <a routerLink="/interventions" routerDirection="forward" routerLinkActive="active" class="nav-item">
        <ion-icon name="library-outline"></ion-icon>
        <span>Interventions</span>
      </a>
      <a routerLink="/my-work-book" routerDirection="forward" routerLinkActive="active" class="nav-item">
        <ion-icon name="book-outline"></ion-icon>
        <span>My Workbook</span>
      </a>
      <a routerLink="/messages" routerDirection="forward" routerLinkActive="active" class="nav-item">
        <ion-icon name="mail-outline"></ion-icon>
        <span>Messages</span>
      </a>
      <a routerLink="/ai-assistant" routerDirection="forward" routerLinkActive="active" class="nav-item">
        <ion-icon name="sparkles-outline"></ion-icon>
        <span>AI Assistant</span>
      </a>
      <a routerLink="/feedback" routerDirection="forward" routerLinkActive="active" class="nav-item">
        <ion-icon name="chatbubbles-outline"></ion-icon>
        <span>Feedback</span>
      </a>
      <a routerLink="/referrals" routerDirection="forward" routerLinkActive="active" class="nav-item">
        <ion-icon name="people-outline"></ion-icon>
        <span>Referrals</span>
      </a>
      <a routerLink="/bookings" routerDirection="forward" routerLinkActive="active" class="nav-item">
        <ion-icon name="calendar-outline"></ion-icon>
        <span>Bookings</span>
      </a>
      <a routerLink="/surveys" routerDirection="forward" routerLinkActive="active" class="nav-item">
        <ion-icon name="clipboard-outline"></ion-icon>
        <span>Surveys</span>
      </a>
    </nav>
    
    <div class="sidebar-footer">
      <button (click)="logOut()" class="logout-btn">
        <ion-icon name="log-out-outline"></ion-icon>
        <span>Logout</span>
      </button>
    </div>
  </div>

  <app-bottom-nav *ngIf="showBottomNav"></app-bottom-nav>
</ion-app>
