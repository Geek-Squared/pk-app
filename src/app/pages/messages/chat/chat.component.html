<ion-header translucent="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button text="" icon="chevron-back" defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Chat</ion-title>
    <ion-buttons slot="end">
      <ion-menu-button autoHide="false"></ion-menu-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="page-content chat-page" #content>
  <section class="chat-thread">
    <div class="chat">
      <ng-container
        *ngFor="
          let msg of chat?.messages;
          index as index;
          trackBy: trackByCreated
        "
      >
        <div class="ion-text-center date">
          <br />
          <span *ngIf="isDifferentDay(index)">{{
            msg?.createdAt | date : 'mediumDate'
          }}</span>
        </div>

        <div class="msg">
          <div class="msg-bubble">
          <div class="user">
            <img [src]="msg.user?.photoURL" />
            <span
              id="profileImage"
              *ngIf="!msg.user?.photoURL"
              [innerHTML]="getInitials(msg?.user?.displayName)"
            ></span>
          </div>
          <div>
            <strong class="name">{{ msg.user?.displayName }}</strong>
            <br />

            <p class="ion-text-justify" *ngIf="msg?.type !== 'audio'">
              {{ msg?.content }}<br />
              <i style="color: steelblue">{{
                msg?.createdAt | date : 'shortTime'
              }}</i>
            </p>

            <div class="audio-container" *ngIf="msg?.type === 'audio'">
              <audio controls preload="auto">
                <source type="audio/mpeg" [src]="msg?.content" />
                [unable to load audio]
              </audio>
            </div>
          </div>
        </div>
      </ng-container>
    </div>
  </section>

  <section class="chat-input">
    <div class="input-shell">
      <ion-button fill="clear" class="mic-btn" (click)="selectedChat = chat">
        <ion-icon name="mic-outline"></ion-icon>
      </ion-button>

      <ion-textarea
        autoGrow="true"
        [(ngModel)]="newMsg"
        placeholder="Send a message or hold the mic"
        (keydown.enter)="submit(chat)"
      ></ion-textarea>

      <ion-button class="send-btn" (click)="submit(chat)">
        <ion-icon name="send"></ion-icon>
      </ion-button>
    </div>
  </section>
</ion-content>
