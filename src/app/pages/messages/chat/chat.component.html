<ion-content [fullscreen]="true" class="page-content chat-page" #content>
  <div class="chat-thread-wrapper">
    <!-- Group Management Action (Top) -->
    <div class="group-management-bar" *ngIf="chat?.type === 'group'">
      <span class="group-label">Group Chat</span>
      <button class="add-member-pill-btn" (click)="addMember()">
        <ion-icon name="person-add-outline"></ion-icon>
        <span>Add Member</span>
      </button>
    </div>
    <ng-container *ngFor="let msg of chat?.messages; index as index; trackBy: trackByCreated">
      <!-- Date Divider -->
      <div class="date-divider" *ngIf="isDifferentDay(index)">
        <span class="date-pill">{{ msg?.createdAt | date : 'EEEE' | uppercase }}</span>
      </div>

      <!-- Message Structure -->
      <div class="message-row" [class.sender]="msg.uid === currentUser?.uid" [class.recipient]="msg.uid !== currentUser?.uid">
        
        <!-- Recipient Avatar -->
        <div class="message-meta-avatar" *ngIf="msg.uid !== currentUser?.uid">
          <div class="avatar-circle">
            <span *ngIf="!msg.user?.photoURL">{{ (msg.user?.displayName || 'C') | slice:0:1 }}</span>
            <img [src]="msg.user?.photoURL" *ngIf="msg.user?.photoURL" />
          </div>
        </div>

        <!-- Bubble Container -->
        <div class="bubble-container">
          <!-- Text Bubble -->
          <div class="bubble" *ngIf="msg?.type === 'text' || !msg?.type">
            <p>{{ msg?.content || msg?.message }}</p>
          </div>

          <!-- Image Bubble -->
          <div class="bubble image-bubble" *ngIf="msg?.type === 'image'">
            <img [src]="msg.content" />
          </div>

          <!-- Audio Bubble -->
          <div class="bubble audio-bubble" *ngIf="msg?.type === 'audio'">
            <div class="audio-player-wrapper">
              <ion-button fill="clear" class="play-btn">
                <ion-icon name="play-sharp"></ion-icon>
              </ion-button>
              <div class="waveform-placeholder">
                <div class="bar" style="height: 40%"></div>
                <div class="bar active" style="height: 60%"></div>
                <div class="bar active" style="height: 80%"></div>
                <div class="bar active" style="height: 50%"></div>
                <div class="bar" style="height: 30%"></div>
              </div>
              <span class="audio-duration">0:42</span>
            </div>
          </div>

          <!-- Timestamp Below -->
          <span class="message-timestamp">{{ msg?.createdAt | date : 'hh:mm a' }}</span>
        </div>
      </div>
    </ng-container>
  </div>

  <!-- Polished Footer -->
  <div class="chat-footer-wrapper" slot="fixed">
    <input type="file" id="chat-file-input" style="display: none" (change)="onFileSelected($event)" accept="image/*" />
    <div class="footer-actions-left">
      <button class="icon-btn" (click)="triggerFileSelect()"><ion-icon name="add-circle-outline"></ion-icon></button>
      <button class="icon-btn" (click)="triggerFileSelect()"><ion-icon name="image-outline"></ion-icon></button>
    </div>
    <div class="input-container">
      <input type="text" placeholder="Type your message..." [(ngModel)]="newMsg" (keydown.enter)="submit(chat)" />
      <button class="emoji-btn"><ion-icon name="happy-outline"></ion-icon></button>
    </div>
    <div class="footer-actions-right">
      <button 
        class="mic-btn" 
        #recordBtn
        [class.recording]="recording"
        (touchstart)="startRecording()" 
        (touchend)="stopRecording()"
        (mousedown)="startRecording()"
        (mouseup)="stopRecording()"
      >
        <ion-icon name="mic-outline"></ion-icon>
      </button>
      <button class="send-btn" (click)="submit(chat)">
        <ion-icon name="send-sharp"></ion-icon>
      </button>
    </div>
  </div>
</ion-content>
