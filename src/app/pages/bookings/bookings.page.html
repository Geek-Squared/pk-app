<ion-content [fullscreen]="true" class="page-content">
  <div class="dashboard-wrapper">
    <!-- Mobile Content -->
    <ion-grid style="height: 100%">
      <ion-row
        class="ion-align-items-center ion-justify-content-center"
        style="height: 100%"
      >
        <ion-card>
          <ion-card-header style="font-size: 2em">
            <h5><ion-icon name="file-tray-full"></ion-icon> Submit Booking</h5>
            <p>All fields are required</p>
          </ion-card-header>
          <ion-card-content>
            <form [formGroup]="bookingsForm">
              <ion-item>
                <!-- <ion-label position="fixed">Name</ion-label> -->
                <ion-input
                  type="text"
                  formControlName="fullName"
                  placeholder="Enter Full Name"
                ></ion-input>
              </ion-item>

              <ion-item>
                <ion-input
                  type="text"
                  formControlName="phoneNumber"
                  placeholder="Phone"
                ></ion-input>
              </ion-item>

              <ion-item>
                <ion-input
                  type="email"
                  formControlName="email"
                  placeholder="Email Address"
                ></ion-input>
              </ion-item>

              <ion-item>
                <ion-input
                  type="date"
                  formControlName="bookingDate"
                  placeholder="Booking Date"
                ></ion-input>
              </ion-item>

              <ion-item>
                <ion-input
                  name="message"
                  formControlName="message"
                  placeholder="Message"
                ></ion-input>
              </ion-item>

              <ion-button
                color="primary"
                expand="block"
                (click)="onSubmit()"
                [disabled]="bookingsForm.invalid"
                >Submit</ion-button
              >
            </form>
          </ion-card-content>
        </ion-card>
      </ion-row>
    </ion-grid>

  <div class="desktop-content">
    <div class="booking-content">
      <div class="page-title desktop-only-title" style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem;">
        <ion-icon name="calendar-outline" style="font-size: 1.5rem; color: #2d72ad;"></ion-icon>
        <h1 style="font-size: 1.75rem; font-weight: 600; color: #1e293b; margin: 0;">Bookings</h1>
      </div>
      <div class="booking-card">
        <div class="card-header">
          <ion-icon name="calendar-outline"></ion-icon>
          <h2>Schedule an Appointment</h2>
          <p>Fill in your details to book a consultation session</p>
        </div>
        
        <form [formGroup]="bookingsForm" class="booking-form">
          <div class="form-row">
            <div class="form-group">
              <label for="fullName">Full Name *</label>
              <ion-input
                type="text"
                formControlName="fullName"
                placeholder="Enter your full name"
                fill="outline"
              ></ion-input>
            </div>

            <div class="form-group">
              <label for="phoneNumber">Phone Number *</label>
              <ion-input
                type="text"
                formControlName="phoneNumber"
                placeholder="Enter your phone number"
                fill="outline"
              ></ion-input>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="email">Email Address *</label>
              <ion-input
                type="email"
                formControlName="email"
                placeholder="Enter your email address"
                fill="outline"
              ></ion-input>
            </div>

            <div class="form-group">
              <label for="bookingDate">Preferred Date *</label>
              <ion-input
                type="date"
                formControlName="bookingDate"
                fill="outline"
              ></ion-input>
            </div>
          </div>

          <div class="form-group full-width">
            <label for="message">Additional Message</label>
            <ion-input
              name="message"
              formControlName="message"
              placeholder="Any additional information or special requests"
              fill="outline"
            ></ion-input>
          </div>

          <ion-button
            color="primary"
            size="large"
            (click)="onSubmit()"
            [disabled]="bookingsForm.invalid"
            class="submit-btn"
          >
            <ion-icon name="calendar-outline" slot="start"></ion-icon>
            Submit Booking
          </ion-button>
        </form>
      </div>
    </div>
    </div>
  </div>
</ion-content>
