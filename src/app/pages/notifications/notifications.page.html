<ion-content [fullscreen]="true" class="page-content">
  <div class="dashboard-wrapper">
    <div class="text-center" *ngIf="isLoading">
      <br /><br />
      <ion-spinner name="crescent"></ion-spinner>
      <br /><br />
    </div>

    <div class="empty-state" *ngIf="!isLoading && notifications?.length < 1">
      <ion-icon name="notifications-outline"></ion-icon>
      <p>No notifications yet.</p>
    </div>

    <ion-list class="notifications-list" *ngIf="!isLoading && notifications?.length">
      <ion-item
        lines="none"
        *ngFor="let note of notifications"
        (click)="openNotification(note)"
        [class.is-unread]="!note?.read"
      >
        <ion-icon name="notifications-outline" slot="start"></ion-icon>
        <ion-label>
          <h2>{{ note?.title }}</h2>
          <p>{{ note?.body }}</p>
          <small
            >{{
              note?.createdAt?.toDate
                ? (note?.createdAt?.toDate() | date: 'medium')
                : (note?.createdAt | date: 'medium')
            }}</small
          >
        </ion-label>
      </ion-item>
    </ion-list>
  </div>
</ion-content>
