<ion-header translucent="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button text="" icon="chevron-back" defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Questions</ion-title>
    <ion-buttons slot="end">
      <ion-menu-button autoHide="false"></ion-menu-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="page-content" class="ion-padding">
  <div *ngFor="let question of filteredQuestions">
    <h3>{{question?.narrative}}</h3>

    <ion-item>
      <ion-textarea
        rows="7"
        placeholder="Enter your response here..."
        [(ngModel)]="questionResponse"
      ></ion-textarea>
    </ion-item>
    
    <!-- Validation feedback -->
    <div *ngIf="isValidating" class="validation-status">
      <ion-spinner name="dots"></ion-spinner>
      <span>{{ validationFeedback }}</span>
    </div>
    
    <div *ngIf="validationFeedback && !isValidating" class="validation-feedback" 
         [ngClass]="{'success-feedback': lastValidationResult?.score >= 8, 
                     'warning-feedback': lastValidationResult?.score >= 5 && lastValidationResult?.score < 8,
                     'error-feedback': lastValidationResult?.score < 5}">
      <ion-icon [name]="lastValidationResult?.score >= 8 ? 'checkmark-circle' : 
                        lastValidationResult?.score >= 5 ? 'information-circle' : 'alert-circle'">
      </ion-icon>
      {{ validationFeedback }}
    </div>
    
    <br />
    <ion-button
      color="light"
      *ngIf="pager.index > 0"
      (click)="goTo(pager.index - 1)"
      >Prev</ion-button
    >
    <ion-button
      *ngIf="!checkPosition()"
      [disabled]="!isCurrentQuestionValid() || isValidating"
      (click)="goTo(pager.index + 1,question)"
      >Next</ion-button
    >
    <ion-button
      color="success"
      *ngIf="checkPosition()"
      [disabled]="!isCurrentQuestionValid() || isValidating"
      (click)="saveQuestionResponses(question)"
      >Complete</ion-button
    >
  </div>

  <div class="ion-text-center" *ngIf=" questions?.length === 0">
    <ion-icon name="search-outline" style="font-size: 3.2em"></ion-icon><br />
    <p>No Questions Available!</p>
  </div>
</ion-content>
