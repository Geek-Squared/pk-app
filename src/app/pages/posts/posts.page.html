<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
      Stories
    </ion-buttons>

    <ion-buttons slot="end">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="posts-content">
  <div class="page-shell">
    <div class="page-header">
      <h1>Stories</h1>
      <p class="page-note">Complete each story to unlock the next.</p>
    </div>

    <div class="story-list">
      <button
        type="button"
        class="story-item"
        *ngFor="let post of posts; let i = index"
        [class.is-locked]="!isStoryUnlocked(i)"
        (click)="handleStoryClick(post, i)"
      >
        <div class="story-icon" [class.completed]="checkProgress(post?.postId)">
          <span *ngIf="checkProgress(post?.postId); else indexBadge">
            <ion-icon name="checkmark"></ion-icon>
          </span>
          <ng-template #indexBadge>
            <span>{{ i + 1 }}</span>
          </ng-template>
        </div>
        <div class="story-text">
          <h2 [class.locked]="!isStoryUnlocked(i)">{{ post?.title }}</h2>
          <p *ngIf="!isStoryUnlocked(i)">Finish the previous story to unlock.</p>
        </div>
        <ion-icon
          class="story-caret"
          [class.locked]="!isStoryUnlocked(i)"
          [name]="isStoryUnlocked(i) ? 'arrow-forward' : 'lock-closed'"
          aria-hidden="true"
        ></ion-icon>
      </button>
    </div>
  </div>
</ion-content>
