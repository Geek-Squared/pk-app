<span>My Workbook</span> / <span>Question Answers</span>

<ion-list>
  <div *ngFor="let item of workbook">
    <ng-container *ngFor="let element of item?.content | keyvalue: sortAnswers">
      <ng-container *ngIf="shouldShowAnswer(item, element)">
        <ion-list>
          <ion-item-divider>
            <ion-label> {{ element?.value?.questionNarrative }} </ion-label>
          </ion-item-divider>
          <ion-item>
            <ion-text>{{ element?.value?.response }}</ion-text>
          </ion-item>
        </ion-list>
      </ng-container>
    </ng-container>
    <hr />
    <br />
  </div>
</ion-list>
