<ion-header translucent="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button text="" icon="chevron-back" defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>My Workbook</ion-title>
    <ion-buttons slot="end">
      <ion-menu-button autoHide="false"></ion-menu-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="page-content" class="workbook-content">
  <!-- Mobile Hero (shows only on mobile) -->
  <div class="mobile-hero">
    <p class="hero-eyebrow">My Work Book</p>
    <h1>Your Progress Journey</h1>
    <p class="hero-subtitle">
      Track your personal growth and explore your completed exercises and reflections.
    </p>
  </div>

  <!-- Main Content Shell -->
  <div class="page-shell">
    <!-- Desktop Navigation (shows only on desktop) -->
    <div class="desktop-nav">
      <div class="nav-content">
        <div class="breadcrumb">
          <a routerLink="/" class="back-btn">
            <ion-icon name="arrow-back-outline"></ion-icon>
            <span>Dashboard</span>
          </a>
          <span class="separator">/</span>
          <span class="current-page">My Work Book</span>
        </div>
        <div class="page-title">
          <ion-icon name="book-outline"></ion-icon>
          <h1>My Work Book</h1>
        </div>
      </div>
    </div>

    <div class="page-body">
      <p class="page-description">
        Your personal journey and progress through the interventions
      </p>
      <router-outlet></router-outlet>
    </div>
  </div>
</ion-content>
