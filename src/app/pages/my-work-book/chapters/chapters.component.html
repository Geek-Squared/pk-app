<!-- Mobile List View -->
<div class="mobile-list">
  <ng-container *ngFor="let chapter of chapters; let i = index">
    <ng-container *ngIf="userQuestionResponses$ | async as res">
      <button
        type="button"
        class="mobile-item"
        [routerLink]="['../posts', chapter.id]"
        *ngIf="canAccessChapter(res[0]?.responses, i)"
      >
        <div class="item-icon">
          <ion-icon name="folder-open-outline"></ion-icon>
        </div>
        <div class="item-content">
          <h2>{{ chapter?.title }}</h2>
          <p>Tap to explore this chapter's content and exercises.</p>
        </div>
        <ion-icon name="arrow-forward" class="item-caret" aria-hidden="true"></ion-icon>
      </button>
    </ng-container>
  </ng-container>
</div>

<!-- Desktop Grid View -->
<ion-grid class="desktop-grid">
  <ion-row class="ion-text-center">
    <ng-container *ngFor="let chapter of chapters; let i = index">
      <ng-container *ngIf="userQuestionResponses$ | async as res">
        <ion-col
          size="4"
          button
          detail
          [routerLink]="['../posts', chapter.id]"
          *ngIf="canAccessChapter(res[0]?.responses, i)"
        >
          <ion-icon name="folder-open" size="large"></ion-icon>
          <br />
          <p>{{ chapter?.title }}</p>
        </ion-col>
      </ng-container>
    </ng-container>
  </ion-row>
</ion-grid>

<ng-container *ngIf="userQuestionResponses$ | async as res">
  <div
    class="hero-chapter-card"
    [class.locked]="!canAccessHeroChapter(res[0]?.responses)"
  >
    <div class="hero-card-copy">
      <p class="eyebrow">Chapter 10</p>
      <h3>Superhero for Life</h3>
      <p>
        Rewrite your story as a hero, unlock powers with Peekay coins, and create an avatar that reflects who you are becoming.
      </p>
      <div class="hero-card-actions">
        <ion-button
          color="primary"
          fill="solid"
          [routerLink]="['../chapter-ten']"
          [disabled]="!canAccessHeroChapter(res[0]?.responses)"
        >
          Launch Chapter 10
          <ion-icon slot="end" name="rocket-outline"></ion-icon>
        </ion-button>
        <ion-text color="medium" *ngIf="!canAccessHeroChapter(res[0]?.responses)">
          Complete earlier chapters with meaningful reflections to unlock.
        </ion-text>
      </div>
    </div>
    <div class="hero-card-visual" aria-hidden="true">
      <div class="hero-avatar">
        <span class="hero-emblem">PK</span>
      </div>
    </div>
  </div>
</ng-container>
