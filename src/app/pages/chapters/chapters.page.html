<ion-content [fullscreen]="true" class="page-content chapters-content">
  <div class="dashboard-wrapper">
    <div class="page-shell">
    <div class="page-header">
      <h1>Chapters</h1>
      <ion-searchbar
        placeholder="Search"
        debounce="350"
        (ionChange)="search($event?.detail?.value)"
      ></ion-searchbar>
    </div>

    <ng-container *ngIf="!isLoading; else loadingState">
      <ng-container *ngIf="filteredChapters.length; else emptyState">
        <div class="chapter-list">
          <button
            type="button"
            class="chapter-item"
            *ngFor="let chapter of filteredChapters; let i = index"
            (click)="handleChapterClick(chapter.id, i)"
            [class.locked]="!canAccessChapter(i)"
          >
            <div class="item-icon">
              <span *ngIf="canAccessChapter(i); else lockIcon">{{ i + 1 }}</span>
              <ng-template #lockIcon>
                <ion-icon name="lock-closed-outline"></ion-icon>
              </ng-template>
            </div>
            <div class="item-text">
              <h2>{{ chapter?.title }}</h2>
              <p *ngIf="chapter?.tagline">{{ chapter?.tagline }}</p>
            </div>
            <ion-icon class="item-caret" name="arrow-forward" aria-hidden="true"></ion-icon>
          </button>
        </div>
      </ng-container>
    </ng-container>
    </div>
  </div>
</ion-content>

<ng-template #loadingState>
  <div class="state-message">
    <ion-spinner name="crescent"></ion-spinner>
    <span>Loading chapters…</span>
  </div>
</ng-template>

<ng-template #emptyState>
  <div class="state-message">
    <ion-icon name="information-circle-outline"></ion-icon>
    <p>No chapters available yet.</p>
  </div>
</ng-template>
